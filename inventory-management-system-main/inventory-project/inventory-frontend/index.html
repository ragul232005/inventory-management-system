<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Simple Inventory</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
  <!-- SockJS & Stomp JS from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
  <header>
    <h1>Inventory Management — Simple</h1>
  </header>

  <main>
    <section class="panel">
      <h2>Products</h2>
      <div class="controls">
        <input id="search" placeholder="Search by name or SKU" />
        <button id="refreshBtn">Refresh</button>
      </div>
      <table id="productsTable">
        <thead><tr><th>ID</th><th>Name</th><th>SKU</th><th>Category</th><th>Price</th><th>Qty</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Add Product</h2>
      <form id="productForm">
        <input name="name" placeholder="Name" required />
        <input name="sku" placeholder="SKU" required />
        <input name="price" placeholder="Price" type="number" step="0.01" />
        <input name="quantity" placeholder="Quantity" type="number" />
        <select name="categoryId" id="categorySelect"></select>
        <button type="submit">Add</button>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
